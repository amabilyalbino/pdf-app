version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      frontend-dependencies:
        patterns:
          - "@supabase/*"
          - "@tauri-apps/*"
          - "@vitejs/*"
          - "pdf-lib"
          - "pdfjs-dist"
          - "react"
          - "react-dom"
          - "vite"
          - "vitest"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
